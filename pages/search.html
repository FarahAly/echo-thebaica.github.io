        <style>
            #results {
                animation: fadeIn 0.2s ease-in-out;
            }
            #results.details-view p{display: block;}
            #results.grid-view p, #results.list-view p{display: none;}
            #results.list-view div ,results.details-view div{
                padding: 10px;
                border-bottom: 1px solid #ccc;
                cursor: pointer;
            }
         
            #results.grid-view {
                display: grid;
                grid-template-columns: auto auto;
                gap: 10px;
            }

            #results.grid-view div {
                border: 1px solid #ccc;
                padding: 10px;
            }

            #pagination button {
                margin: 5px;
            }

            .hidden {
                display: none;
            }

            #detailsBox {
                border: 2px solid #000;
                padding: 15px;
                margin-top: 20px;
            }

        </style>

    </head>
