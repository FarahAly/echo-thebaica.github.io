<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>register</title>

    <link rel="stylesheet" href="../css/theme1/stone.css">

    <script> const urlIndex = 1;</script>
    <script src="JS/mainCode.js"></script>

</head>
<body>
    <button id="themeBTN" onclick="changeTheme(1)">Theme 1: stone</button>
    <div class="page-reg">
        <h1>Register</h1>
        <form action="" method="POST">

            <div class="user">
                <label for="username">Username</label>
                <input type="text" placeholder="user name" id="username">

            </div>

            <div class="input-reg">
                <label for="gmail">Gmail</label>
                <input type="text" placeholder="Email" id="email">
            </div>

            <div class="password-reg">
                <label for="password">password</label>
                <input type="password" placeholder="password" id="pass">
            </div>

            <div class="ck-pass">
                <label for="passConf">Confirm password</label>
                <input type="password" placeholder="confirm your password" id="passConf">
            </div>

            <div class="phone">
                <label for="telphone">telphone</label>
                <input type="text" placeholder="telephone" id="telephone">
            </div>
            
            <div class="gender-details">
                <h2>Gender</h2>
                <div class="category">
                    <label for="dot-1">
                        <span class="dot one"></span>
                        <input type="radio" name="gender" id="dot-1" value="male">
                        <span class="gender">male</span>
                    </label>
                    <label for="dot-2">
                        <span class="dot two"></span>
                        <input type="radio" name="gender" id="dot-2" value="female">
                        <span class="gender">female</span>
                    </label>
                    <div id="confirm"></div>
                </div>
                <button type="button" class="btn" onclick="send();">sign up</button>
            </div>

        </form>

    </div>

   <script src="../JS/register.js" defer></script>
</body>
</html>
