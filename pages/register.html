<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registeration - Echo Thebaica</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../CSS/theme1/stone.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <title>register</title>
    <script> const urlIndex = 1;</script>
    <script src="../JS/mainCode.js"></script>
    <meta
      name="description"
      content="Discover Karnak Temple, the largest temple complex in Egypt."
    />

</head>
<body class="containsForms">
    <header>
    <button id="themeBTN" onclick="changeTheme(1)">Theme 1: stones</button>
    </header>
    <div class="page-reg">

        <form id="form">
        <h1>Register</h1>
            <div class="user">
                <label for="username">Username</label>
                <input type="text" placeholder="user name" id="username">
            </div>

            <div class="input-reg">
                <label for="email">Gmail</label>
                <input type="text" placeholder="Email" id="email">
            </div>

            <div class="password-reg">
                <label for="password">Password</label>
                <input type="password" placeholder="password" id="pass">
            </div>

            <div class="ck-pass">
                <label for="passConf">Confirm password</label>
                <input type="password" placeholder="confirm your password" id="passConf">
            </div>

            <div class="phone">
                <label for="telphone">Telphone</label>
                <input type="text" placeholder="telephone" id="telephone">
            </div>
            
            <div class="gender-details">
                <h2>Gender</h2>

                <div class="category">
                    <label for="dot-1">
                        <span class="dot one"></span>
                        <input type="radio" name="gender" id="dot-1" value="male">
                        <span class="gender">male</span>
                    </label>
                    <label for="dot-2">
                        <span class="dot two"></span>
                        <input type="radio" name="gender" id="dot-2" value="female">
                        <span class="gender">female</span>
                    </label>



                </div><!--closing category-->

            </div>
            <div id="confirm"></div>
            <button type="button" class="btn" onclick="send();">register</button>
            
        </form>

    </div><!--closing page-reg-->

   <script src="../JS/register.js" defer></script>
</body>
</html>
